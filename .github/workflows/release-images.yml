name: Release images

# Build and push multi-architecture (amd64 + arm64) images so the compose
# `prod` profile runs natively on Intel and Apple Silicon.
#
# Triggers on version tags (vX.Y.Z) or manual dispatch. Requires repository
# secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN with push access to the
# REGISTRY namespace below.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        default: "refactor"

env:
  REGISTRY: ishikii

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        uses: docker/bake-action@v7
        with:
          push: true
          set: |
            *.platform=linux/amd64,linux/arm64
        env:
          REGISTRY: ${{ env.REGISTRY }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
