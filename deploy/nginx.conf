# Reverse proxy: TLS terminator that serves the SPA and the API from one
# origin (so auth cookies are first-party). Certificate files are provided by
# lego under /etc/lego/live (symlinks to the active short-lived certificate).

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME HTTP-01 webroot — used by lego for short-lived cert renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    # Everything else is redirected to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/lego/live/fullchain.pem;
    ssl_certificate_key /etc/lego/live/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    # Excel + Word uploads can be large.
    client_max_body_size 200m;

    # API → FastAPI backend.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Server-Sent Events (/api/process/stream): stream, don't buffer.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Everything else → Vite (the prod image runs the Vite server). Upstream
    # Host is forced to localhost to satisfy Vite's allowed-hosts check.
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host localhost;
        proxy_set_header X-Forwarded-Proto https;

        # Vite HMR websocket.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
