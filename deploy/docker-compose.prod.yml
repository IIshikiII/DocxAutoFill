# Production stack for a single host behind an nginx TLS terminator.
#
# Only nginx publishes ports (80/443); the app and database stay on the
# internal network and are never exposed directly. All tunables come from a
# sibling `.env` file (see deploy/deploy.env.example and docs/DEPLOYMENT.md).
#
#   docker compose -f docker-compose.prod.yml up -d
#
# Data persists in the named `pgdata` volume across container recreation.

name: docxautofill

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  backend:
    image: "ishikii/docx_backend:${IMAGE_TAG:-1.0.0}"
    restart: unless-stopped
    environment:
      DOCXAUTOFILL_HOST: "0.0.0.0"
      DOCXAUTOFILL_PORT: "3000"
      DOCXAUTOFILL_DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      DOCXAUTOFILL_ADMIN_USERNAME: "${DOCXAUTOFILL_ADMIN_USERNAME}"
      DOCXAUTOFILL_ADMIN_PASSWORD: "${DOCXAUTOFILL_ADMIN_PASSWORD}"
      DOCXAUTOFILL_COOKIE_SECURE: "${DOCXAUTOFILL_COOKIE_SECURE:-true}"
      DOCXAUTOFILL_CORS_ORIGINS: "${DOCXAUTOFILL_CORS_ORIGINS}"
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

  frontend:
    image: "ishikii/docx_front:${IMAGE_TAG:-1.0.0}"
    restart: unless-stopped
    environment:
      VITE_API_URL: "${VITE_API_URL}"
    depends_on:
      - backend
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    container_name: docxautofill-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/lego:/etc/lego:ro
      - /var/www/acme:/var/www/acme:ro
    depends_on:
      - backend
      - frontend
    networks: [internal]

networks:
  internal:

volumes:
  pgdata:
